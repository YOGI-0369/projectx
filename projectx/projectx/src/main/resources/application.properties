# ==========================================
# AutoFolio - Application Configuration
# ==========================================

# Server
server.port=8080

# ==========================================
# MySQL Database Configuration
# CHANGE: username and password to yours
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/projectx_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Yogesh@180
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# File Upload (for profile photo later)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# App name
spring.application.name=ProjectX
